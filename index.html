<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="big-div">
            <h1 class="title">Metric/Imperial Unit Converter</h1>
            <div class="little-box">
                <input type="Number" id="num-box" value=""/>
            </div>
            <button id="btn-convert">Convert</button>
        </div>
        <div>
            <div class="div-1">
                <h1>Length (Meter/Feet)</h1>
                <h2 id="converted"></h2>
            </div>
            <div class="div-2">
                <h1>Volume (Liters/Gallons)</h1>
                <h2 id="converted1"></h2>
            </div>
            <div class="div-3">
                <h1>Mass (Killograms/Pounds)</h1>
                <h2 id="converted2"></h2>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
